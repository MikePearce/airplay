<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024,height=600,user-scalable=no">
<title>Now Playing</title>
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --accent: #00e8a0;
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --text: #ffffff;
    --text-dim: #888888;
    --text-muted: #555555;
  }
  body {
    width: 1024px; height: 600px; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    cursor: none; user-select: none;
  }

  /* ---- Blurred background ---- */
  .bg-blur {
    position: absolute; top: -40px; left: -40px;
    width: calc(100% + 80px); height: calc(100% + 80px);
    background-size: cover; background-position: center;
    filter: blur(60px) brightness(0.3) saturate(1.4);
    transform: scale(1.1);
    transition: opacity 0.8s ease;
    opacity: 0;
  }
  .bg-blur.visible { opacity: 1; }

  /* ---- Player View ---- */
  .player {
    position: relative; z-index: 1;
    display: flex; width: 100%; height: 100%;
    padding: 48px 56px; gap: 56px; align-items: center;
    opacity: 0; transition: opacity 0.6s ease;
  }
  .player.visible { opacity: 1; }

  /* Artwork */
  .artwork {
    width: 480px; height: 480px; border-radius: 20px;
    background: var(--surface); overflow: hidden;
    box-shadow: 0 12px 60px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .artwork img {
    width: 100%; height: 100%; object-fit: cover;
    display: none;
  }
  .artwork img.loaded { display: block; }
  .artwork-placeholder {
    width: 100%; height: 100%; display: flex;
    align-items: center; justify-content: center;
  }
  .artwork-placeholder svg { width: 100px; height: 100px; fill: var(--text-muted); }

  /* Right column */
  .right {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; gap: 28px; min-width: 0;
  }

  /* Track info */
  .track-info { display: flex; flex-direction: column; gap: 6px; }
  .track-title {
    font-size: 46px; font-weight: 700; color: var(--text);
    line-height: 1.1;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .track-artist {
    font-size: 30px; font-weight: 500; color: rgba(255,255,255,0.8);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-album {
    font-size: 20px; color: rgba(255,255,255,0.45); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Progress */
  .progress-section { display: flex; flex-direction: column; gap: 8px; }
  .progress-bar {
    width: 100%; height: 5px; background: rgba(255,255,255,0.12);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 3px; transition: width 0.3s linear;
  }
  .progress-times {
    display: flex; justify-content: space-between;
    font-size: 14px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums;
  }

  /* Source */
  .source { margin-top: 4px; }
  .source-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 2.5px; color: rgba(255,255,255,0.25);
    font-weight: 600;
  }
  .source-name {
    font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* ---- Idle View ---- */
  .idle {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    opacity: 1; transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .idle.hidden { opacity: 0; pointer-events: none; }
  .clock {
    font-size: 120px; font-weight: 200;
    color: var(--text-muted); letter-spacing: 6px;
  }
  .idle-name {
    font-size: 20px; color: var(--text-muted);
    margin-top: 16px; letter-spacing: 1.5px;
  }
</style>
</head>
<body>

<!-- Blurred album art background -->
<div class="bg-blur" id="bgBlur"></div>

<!-- Player View -->
<div class="player" id="player">
  <div class="artwork" id="artworkContainer">
    <div class="artwork-placeholder" id="placeholder">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
    <img id="cover" alt="">
  </div>

  <div class="right">
    <div class="track-info">
      <div class="track-title" id="title">--</div>
      <div class="track-artist" id="artist">--</div>
      <div class="track-album" id="album">--</div>
    </div>

    <div class="progress-section">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="elapsed">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="source">
      <div class="source-label">PLAYING FROM</div>
      <div class="source-name" id="clientName">--</div>
    </div>
  </div>
</div>

<!-- Idle View -->
<div class="idle" id="idle">
  <div class="clock" id="clock">00:00</div>
  <div class="idle-name" id="idleName">Kitchen Speaker</div>
  <div id="debugStatus" style="position:fixed;bottom:10px;left:10px;font-size:12px;color:#444;font-family:monospace;"></div>
</div>

<script>
  // ---- Config ----
  //const MQTT_WS = 'ws://localhost:9001';
  const MQTT_WS = 'ws://192.168.1.182:9001';
  const TOPIC = 'shairport-sync';
  const SAMPLE_RATE = 44100;
  const DEBUG = true;

  // ---- State ----
  let playing = false;
  let prgStart = 0, prgCurrent = 0, prgEnd = 0;
  let prgTimestamp = 0;
  let coverUrl = null;

  // ---- Elements ----
  const elPlayer = document.getElementById('player');
  const elIdle = document.getElementById('idle');
  const elBgBlur = document.getElementById('bgBlur');
  const elTitle = document.getElementById('title');
  const elArtist = document.getElementById('artist');
  const elAlbum = document.getElementById('album');
  const elCover = document.getElementById('cover');
  const elPlaceholder = document.getElementById('placeholder');
  const elClientName = document.getElementById('clientName');
  const elProgressFill = document.getElementById('progressFill');
  const elElapsed = document.getElementById('elapsed');
  const elDuration = document.getElementById('duration');
  const elClock = document.getElementById('clock');
  const elIdleName = document.getElementById('idleName');

  // ---- MQTT ----
  let client = null;

  function mqttConnect() {
    client = mqtt.connect(MQTT_WS, {
      reconnectPeriod: 3000,
      connectTimeout: 10000
    });

    client.on('connect', function() {
      client.subscribe(TOPIC + '/#');
      if (DEBUG) document.getElementById('debugStatus').textContent = 'MQTT: connected';
    });

    client.on('error', function(err) {
      if (DEBUG) document.getElementById('debugStatus').textContent = 'MQTT error: ' + err.message;
    });

    client.on('close', function() {
      if (DEBUG) document.getElementById('debugStatus').textContent = 'MQTT: disconnected';
    });

    client.on('message', function(topic, message) {
      if (DEBUG) document.getElementById('debugStatus').textContent = 'MSG: ' + topic;
      var sub = topic.substring(TOPIC.length + 1);
      var text = message.toString();

      switch (sub) {
        case 'title':
          if (text && text !== '--') elTitle.textContent = text;
          break;
        case 'artist':
          if (text && text !== '--') elArtist.textContent = text;
          break;
        case 'album':
          if (text && text !== '--') elAlbum.textContent = text;
          break;
        case 'client_name':
          if (text && text !== '--') elClientName.textContent = text;
          break;
        case 'playing':
          setPlaying(text === '1');
          break;
        case 'cover':
          handleCover(message);
          break;
        case 'ssnc/prgr':
          handleProgress(text);
          break;
        case 'play_end':
          resetTrack();
          break;
      }
    });
  }

  // ---- Playback State ----
  function setPlaying(state) {
    playing = state;
    if (playing) {
      elPlayer.classList.add('visible');
      elIdle.classList.add('hidden');
    }
  }

  var idleTimeout = null;

  function resetTrack() {
    clearTimeout(idleTimeout);
    idleTimeout = setTimeout(function() {
      if (!playing) {
        elPlayer.classList.remove('visible');
        elIdle.classList.remove('hidden');
        elBgBlur.classList.remove('visible');
        elTitle.textContent = '--';
        elArtist.textContent = '--';
        elAlbum.textContent = '--';
        elElapsed.textContent = '0:00';
        elDuration.textContent = '0:00';
        elProgressFill.style.width = '0%';
        if (coverUrl) { URL.revokeObjectURL(coverUrl); coverUrl = null; }
        elCover.classList.remove('loaded');
        elPlaceholder.style.display = 'flex';
      }
    }, 5000);
  }

  // ---- Cover Art ----
  function handleCover(data) {
    if (data.length < 100) return;
    if (coverUrl) URL.revokeObjectURL(coverUrl);
    var blob = new Blob([data], { type: 'image/jpeg' });
    coverUrl = URL.createObjectURL(blob);
    elCover.onload = function() {
      elCover.classList.add('loaded');
      elPlaceholder.style.display = 'none';
      // Set blurred background
      elBgBlur.style.backgroundImage = 'url(' + coverUrl + ')';
      elBgBlur.classList.add('visible');
    };
    elCover.src = coverUrl;
  }

  // ---- Progress ----
  function handleProgress(text) {
    var parts = text.split('/');
    if (parts.length === 3) {
      prgStart = parseInt(parts[0], 10);
      prgCurrent = parseInt(parts[1], 10);
      prgEnd = parseInt(parts[2], 10);
      prgTimestamp = performance.now();
    }
  }

  function updateProgress() {
    if (playing && prgEnd > prgStart) {
      var now = performance.now();
      var elapsedMs = now - prgTimestamp;
      var extraFrames = (elapsedMs / 1000) * SAMPLE_RATE;
      var current = prgCurrent + extraFrames;
      var total = prgEnd - prgStart;
      var done = current - prgStart;
      var pct = Math.min(100, Math.max(0, (done / total) * 100));

      elProgressFill.style.width = pct + '%';

      var elapsedSec = Math.max(0, Math.floor(done / SAMPLE_RATE));
      var totalSec = Math.floor(total / SAMPLE_RATE);
      elElapsed.textContent = formatTime(elapsedSec);
      elDuration.textContent = formatTime(totalSec);
    }
    requestAnimationFrame(updateProgress);
  }

  function formatTime(sec) {
    if (isNaN(sec) || sec < 0) return '0:00';
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  // ---- Clock ----
  function updateClock() {
    var now = new Date();
    var h = now.getHours().toString().padStart(2, '0');
    var m = now.getMinutes().toString().padStart(2, '0');
    elClock.textContent = h + ':' + m;
  }

  // ---- Init ----
  mqttConnect();
  updateProgress();
  updateClock();
  setInterval(updateClock, 10000);

  var cursorTimer = null;
  document.addEventListener('touchstart', function() {
    document.body.style.cursor = 'default';
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(function() {
      document.body.style.cursor = 'none';
    }, 3000);
  });
</script>
</body>
</html>
